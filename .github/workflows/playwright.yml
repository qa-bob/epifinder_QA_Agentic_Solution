name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  test:
    name: Playwright (${{ matrix.project }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project:
          - chromium-desktop
          - mobile-chrome
          - tablet

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project == 'chromium-desktop' && 'chromium' || matrix.project == 'mobile-chrome' && 'chromium' || 'chromium' }}

      - name: Run smoke tests (fast gate)
        run: npx playwright test --grep @smoke --project=${{ matrix.project }}
        env:
          CI: true

      - name: Run full test suite
        run: npx playwright test --project=${{ matrix.project }}
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results-${{ matrix.project }}
          path: |
            test-results/
            playwright-report/
          retention-days: 14

      - name: Upload visual snapshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diff-${{ matrix.project }}
          path: test-results/**/*-diff.png
          retention-days: 7
